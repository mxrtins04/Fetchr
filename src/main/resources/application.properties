spring.application.name=fetchr-backend

# Server Configuration
server.port=8080

# Fetchr Application Configuration
siphon.download-dir=./downloads
siphon.max-concurrent-downloads=3
siphon.default-quality=1080P
siphon.default-subtitle-language=en

# Logging
logging.level.com.fetchr=DEBUG
logging.level.okhttp3=DEBUG
